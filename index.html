<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trader Logistics | Secure Search Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background">
        <div class="glass-container">
            <div class="login-box">
                <div class="header">
                    <div class="logo">
                        <span class="icon">🚛</span>
                        <h1>Logistics Portal</h1>
                    </div>
                    <p>Enter your credentials to access the dashboard</p>
                </div>

                <div class="tab-container">
                    <button class="tab-btn active" id="trader-tab" onclick="switchTab('trader')">Traders Login</button>
                    <button class="tab-btn" id="mine-tab" onclick="switchTab('mine')">Mines Login</button>
                    <div class="tab-indicator"></div>
                </div>

                <form id="login-form">
                    <div class="input-group">
                        <label for="username">Username / Email</label>
                        <div class="input-wrapper">
                            <input type="text" id="username" placeholder="e.g. john_trader" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember">
                            <input type="checkbox"> <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>

                    <button type="submit" class="submit-btn" id="submit-btn">Login as Trader</button>
                </form>

                <div class="footer">
                    <p>Don't have an account? <a href="#">Request Access</a></p>
                </div>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
